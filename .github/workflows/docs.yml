name: Documentation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install documentation dependencies
        run: pip install -r documentation/requirements.txt
      - name: Build documentation
        run: sphinx-build -c documentation/config -b html documentation/pages documentation/build/html
      - uses: actions/upload-pages-artifact@v3
        if: github.event_name == 'push'
        with:
          path: documentation/build/html

  deploy:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Documentation (GitHub Pages)
        id: deployment
        uses: actions/deploy-pages@v4
